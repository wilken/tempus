<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tempus — Login</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                font-family:
                    system-ui,
                    -apple-system,
                    sans-serif;
                background: #f5f7fa;
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                color: #1a1a1a;
            }
            .card {
                background: white;
                border-radius: 12px;
                padding: 56px 48px;
                text-align: center;
                box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
                width: 360px;
            }
            h1 {
                font-size: 2rem;
                font-weight: 700;
                margin-bottom: 6px;
                letter-spacing: -0.5px;
            }
            .subtitle {
                color: #666;
                font-size: 15px;
                margin-bottom: 40px;
            }
            .btn-google {
                display: inline-flex;
                align-items: center;
                gap: 12px;
                padding: 12px 24px;
                background: white;
                border: 1px solid #dadce0;
                border-radius: 6px;
                color: #3c4043;
                text-decoration: none;
                font-size: 15px;
                font-weight: 500;
                transition:
                    box-shadow 0.2s,
                    background 0.1s;
                width: 100%;
                justify-content: center;
            }
            .btn-google:hover {
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
                background: #f8f9fa;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h1>Tempus fugit</h1>
            <p class="subtitle">Time registration</p>
            <a class="btn-google" href="/auth/google">
                <svg
                    width="18"
                    height="18"
                    viewBox="0 0 18 18"
                    aria-hidden="true"
                >
                    <path
                        fill="#4285F4"
                        d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"
                    />
                    <path
                        fill="#34A853"
                        d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"
                    />
                    <path
                        fill="#FBBC05"
                        d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"
                    />
                    <path
                        fill="#EA4335"
                        d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"
                    />
                </svg>
                Sign in with Google
            </a>
        </div>
    </body>
</html>
