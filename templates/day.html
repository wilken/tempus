<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tempus fugit— {{.DateFormatted}}</title>
        <link rel="stylesheet" href="/static/style.css" />
    </head>
    <body>
        <header>
            <h1>Tempus fugit</h1>
            <div class="header-right">
                <span>{{.UserName}}</span>
                <a href="/logout">Sign out</a>
            </div>
        </header>

        <div class="page-nav">
            <a class="nav-btn" href="/day/{{.PrevDate}}">&#8592; Previous</a>
            <h2>{{.DateFormatted}}</h2>
            <a class="nav-btn" href="/day/{{.NextDate}}">Next &#8594;</a>
        </div>

        <div id="toast"></div>
        <div class="container">
            <form method="POST" action="/day/{{.Date}}/save" id="day-form">
                <div class="card">
                    <table>
                        <thead>
                            <tr>
                                <th>Task</th>
                                <th>Subtask</th>
                                <th class="col-hours">
                                    Hours
                                </th>
                                <th></th>
                            </tr>
                        </thead>
                        <datalist id="task-list">
                            {{range .TaskSuggestions}}
                            <option value="{{.}}">{{end}}</option>
                        </datalist>
                        <datalist id="subtask-list"></datalist>
                        <tbody id="entries">
                            {{range .Entries}}
                            <tr>
                                <td>
                                    <input
                                        type="text"
                                        name="task"
                                        value="{{.Task}}"
                                        placeholder="Task name"
                                        list="task-list"
                                        oninput="
                                            updateSubtaskSuggestions(
                                                this.closest('tr'),
                                            )
                                        "
                                    />
                                </td>
                                <td>
                                    <input
                                        type="text"
                                        name="subtask"
                                        value="{{.Subtask}}"
                                        placeholder="Subtask (optional)"
                                        list="subtask-list"
                                        onfocus="
                                            updateSubtaskSuggestions(
                                                this.closest('tr'),
                                            )
                                        "
                                    />
                                </td>
                                <td class="col-hours">
                                    <input
                                        type="number"
                                        name="hours"
                                        value="{{.Hours}}"
                                        min="0.25"
                                        max="24"
                                        step="0.25"
                                        placeholder="0"
                                        onkeydown="hoursTab(event)"
                                    />
                                </td>
                                <td>
                                    <button
                                        type="button"
                                        class="btn-delete"
                                        tabindex="-1"
                                        onclick="deleteRow(this)"
                                        title="Remove row"
                                    >
                                        &#215;
                                    </button>
                                </td>
                            </tr>
                            {{end}}
                        </tbody>
                    </table>
                    <div class="table-foot">
                        <button
                            type="button"
                            class="btn-add"
                            onclick="addRow()"
                        >
                            + Add row
                        </button>
                        <span class="total-label"
                            >Total:
                            <strong id="total-hours"
                                >{{printf "%.2f" .TotalHours}}h</strong
                            ></span
                        >
                    </div>
                </div>

                <div class="actions">
                    <a class="btn-export" href="/week/{{.Date}}">
                        &#128197; View week
                    </a>
                    <button type="button" id="btn-save" class="btn-save" disabled onclick="saveForm()">Save</button>
                </div>
            </form>
        </div>

        <script>
            const subtasksByTask = {{.SubtasksByTask}};

            let dirty = false;

            function rowIsComplete(row) {
              const task = row.querySelector('input[name="task"]').value.trim();
              const subtask = row.querySelector('input[name="subtask"]').value.trim();
              const hours = parseFloat(row.querySelector('input[name="hours"]').value);
              return task !== '' && subtask !== '' && hours > 0;
            }

            function updateSaveButton() {
              const btn = document.getElementById('btn-save');
              const hasComplete = Array.from(document.querySelectorAll('#entries tr')).some(rowIsComplete);
              btn.disabled = !(dirty && hasComplete);
            }

            function markDirty() {
              dirty = true;
              updateSaveButton();
            }

            function markClean() {
              dirty = false;
              updateSaveButton();
            }

            function updateSubtaskSuggestions(row) {
              const task = row.querySelector('input[name="task"]').value;
              const subtasks = subtasksByTask[task] || [];
              const datalist = document.getElementById('subtask-list');
              datalist.innerHTML = '';
              subtasks.forEach(function(s) {
                const opt = document.createElement('option');
                opt.value = s;
                datalist.appendChild(opt);
              });
            }

            function addRow() {
              const tbody = document.getElementById('entries');
              const tr = document.createElement('tr');
              tr.innerHTML = `
                <td><input type="text" name="task" placeholder="Task name" list="task-list" oninput="updateSubtaskSuggestions(this.closest('tr'))"></td>
                <td><input type="text" name="subtask" placeholder="Subtask (optional)" list="subtask-list" onfocus="updateSubtaskSuggestions(this.closest('tr'))"></td>
                <td class="col-hours"><input type="number" name="hours" min="0.25" max="24" step="0.25" placeholder="0" onkeydown="hoursTab(event)"></td>
                <td><button type="button" class="btn-delete" tabindex="-1" onclick="deleteRow(this)" title="Remove row">&#215;</button></td>
              `;
              tbody.appendChild(tr);
              tr.querySelector('input[name="task"]').focus();
              updateTotal();
            }

            function deleteRow(btn) {
              btn.closest('tr').remove();
              updateTotal();
              saveForm();
            }

            function updateTotal() {
              let total = 0;
              document.querySelectorAll('input[name="hours"]').forEach(function(el) {
                total += parseFloat(el.value) || 0;
              });
              document.getElementById('total-hours').textContent = total.toFixed(2) + 'h';
            }

            document.getElementById('entries').addEventListener('input', function(e) {
              if (e.target.name === 'hours') updateTotal();
              markDirty();
            });

            let toastTimer;
            function showToast(msg, type) {
              const t = document.getElementById('toast');
              t.textContent = msg;
              t.className = 'show ' + type;
              clearTimeout(toastTimer);
              if (type === 'ok') toastTimer = setTimeout(() => t.className = '', 2000);
            }

            async function saveForm() {
              const form = document.getElementById('day-form');
              try {
                const resp = await fetch(form.action, {
                  method: 'POST',
                  body: new URLSearchParams(new FormData(form)),
                  headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                  redirect: 'manual'
                });
                // redirect: 'manual' makes a 303 come back as opaqueredirect (status 0)
                if (resp.ok || resp.type === 'opaqueredirect') {
                  showToast('Saved', 'ok');
                  markClean();
                } else {
                  showToast('Server error — changes may not be saved', 'err');
                }
              } catch {
                showToast('Connection lost — changes not saved', 'err');
              }
            }

            function learnFromRow(row) {
              const task = row.querySelector('input[name="task"]').value.trim();
              const subtask = row.querySelector('input[name="subtask"]').value.trim();
              if (!task) return;
              // Add task to datalist if not already present.
              const taskList = document.getElementById('task-list');
              if (!Array.from(taskList.options).some(o => o.value === task)) {
                const opt = document.createElement('option');
                opt.value = task;
                taskList.insertBefore(opt, taskList.firstChild);
              }
              // Add subtask to the map if not already present.
              if (subtask) {
                if (!subtasksByTask[task]) subtasksByTask[task] = [];
                if (!subtasksByTask[task].includes(subtask)) {
                  subtasksByTask[task].unshift(subtask);
                }
              }
            }

            function hoursTab(e) {
              if (e.key !== 'Tab' || e.shiftKey) return;
              const rows = document.querySelectorAll('#entries tr');
              const isLastRow = e.target.closest('tr') === rows[rows.length - 1];
              learnFromRow(e.target.closest('tr'));
              saveForm();
              if (isLastRow) {
                e.preventDefault();
                addRow();
              }
            }

            // Start with one empty row if there are no entries.
            if (document.getElementById('entries').children.length === 0) {
              addRow();
            }
        </script>
    </body>
</html>
