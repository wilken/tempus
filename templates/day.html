<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tempus — {{.DateFormatted}}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f5f7fa; color: #1a1a1a; }

    /* Header */
    header {
      background: white;
      border-bottom: 1px solid #e8eaed;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }
    header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.3px; }
    .header-right { display: flex; align-items: center; gap: 16px; font-size: 14px; color: #555; }
    .header-right a { color: #555; text-decoration: none; }
    .header-right a:hover { color: #1a1a1a; }

    /* Day navigation */
    .day-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      max-width: 860px;
      margin: 0 auto;
    }
    .day-nav h2 { font-size: 1.15rem; font-weight: 600; }
    .nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: #444;
      padding: 8px 16px;
      border: 1px solid #dadce0;
      border-radius: 6px;
      background: white;
      font-size: 14px;
      transition: background 0.1s;
      min-width: 110px;
      justify-content: center;
    }
    .nav-btn:hover { background: #f0f4ff; border-color: #b3c2f0; }

    /* Main content */
    .container { max-width: 860px; margin: 0 auto; padding: 0 24px 64px; }

    .card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      overflow: hidden;
    }

    /* Table */
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 11px 14px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      border-bottom: 1px solid #e8eaed;
      background: #fafafa;
    }
    tbody tr { border-bottom: 1px solid #f0f0f0; }
    tbody tr:last-child { border-bottom: none; }
    tbody td { padding: 6px 6px; }
    tbody td:first-child { padding-left: 14px; }
    tbody td:last-child { width: 44px; text-align: center; }

    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid transparent;
      border-radius: 5px;
      font-size: 14px;
      background: transparent;
      font-family: inherit;
      color: inherit;
    }
    input[type="text"]:hover, input[type="number"]:hover {
      border-color: #dadce0;
      background: white;
    }
    input[type="text"]:focus, input[type="number"]:focus {
      outline: none;
      border-color: #4285F4;
      background: white;
      box-shadow: 0 0 0 3px rgba(66,133,244,0.12);
    }
    .col-hours { width: 100px; }
    .col-hours input { text-align: right; }

    .btn-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: #bbb;
      font-size: 20px;
      line-height: 1;
      padding: 4px 6px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    .btn-delete:hover { color: #e53935; }

    /* Table footer */
    .table-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-top: 1px solid #e8eaed;
      background: #fafafa;
    }
    .btn-add {
      background: none;
      border: none;
      cursor: pointer;
      color: #4285F4;
      font-size: 14px;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 0;
      font-weight: 500;
    }
    .btn-add:hover { color: #1a73e8; }
    .total-label { font-size: 14px; color: #666; }
    .total-label strong { color: #1a1a1a; font-size: 15px; }

    /* Bottom actions */
    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
    }
    .btn-export {
      color: #4285F4;
      text-decoration: none;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 8px 0;
    }
    .btn-export:hover { text-decoration: underline; }
    .btn-save {
      padding: 10px 28px;
      background: #4285F4;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-save:hover { background: #1a73e8; }
    .btn-save:active { background: #1557b0; }
  </style>
</head>
<body>
  <header>
    <h1>Tempus</h1>
    <div class="header-right">
      <span>{{.UserName}}</span>
      <a href="/logout">Sign out</a>
    </div>
  </header>

  <div class="day-nav">
    <a class="nav-btn" href="/day/{{.PrevDate}}">&#8592; Previous</a>
    <h2>{{.DateFormatted}}</h2>
    <a class="nav-btn" href="/day/{{.NextDate}}">Next &#8594;</a>
  </div>

  <div class="container">
    <form method="POST" action="/day/{{.Date}}/save" id="day-form">
      <div class="card">
        <table>
          <thead>
            <tr>
              <th>Task</th>
              <th>Subtask</th>
              <th class="col-hours" style="text-align:right; padding-right:20px">Hours</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="entries">
            {{range .Entries}}
            <tr>
              <td><input type="text" name="task" value="{{.Task}}" placeholder="Task name"></td>
              <td><input type="text" name="subtask" value="{{.Subtask}}" placeholder="Subtask (optional)"></td>
              <td class="col-hours"><input type="number" name="hours" value="{{.Hours}}" min="0.25" max="24" step="0.25" placeholder="0"></td>
              <td><button type="button" class="btn-delete" onclick="deleteRow(this)" title="Remove row">&#215;</button></td>
            </tr>
            {{end}}
          </tbody>
        </table>
        <div class="table-foot">
          <button type="button" class="btn-add" onclick="addRow()">+ Add row</button>
          <span class="total-label">Total: <strong id="total-hours">{{printf "%.2f" .TotalHours}}h</strong></span>
        </div>
      </div>

      <div class="actions">
        <a class="btn-export" href="/export/week?date={{.Date}}">
          &#8659; Export week to Excel
        </a>
        <button type="submit" class="btn-save">Save</button>
      </div>
    </form>
  </div>

  <script>
    function addRow() {
      const tbody = document.getElementById('entries');
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><input type="text" name="task" placeholder="Task name"></td>
        <td><input type="text" name="subtask" placeholder="Subtask (optional)"></td>
        <td class="col-hours"><input type="number" name="hours" min="0.25" max="24" step="0.25" placeholder="0"></td>
        <td><button type="button" class="btn-delete" onclick="deleteRow(this)" title="Remove row">&#215;</button></td>
      `;
      tbody.appendChild(tr);
      tr.querySelector('input[name="task"]').focus();
      updateTotal();
    }

    function deleteRow(btn) {
      btn.closest('tr').remove();
      updateTotal();
    }

    function updateTotal() {
      let total = 0;
      document.querySelectorAll('input[name="hours"]').forEach(function(el) {
        total += parseFloat(el.value) || 0;
      });
      document.getElementById('total-hours').textContent = total.toFixed(2) + 'h';
    }

    document.getElementById('entries').addEventListener('input', function(e) {
      if (e.target.name === 'hours') updateTotal();
    });

    // Start with one empty row if there are no entries.
    if (document.getElementById('entries').children.length === 0) {
      addRow();
    }
  </script>
</body>
</html>
