<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tempus fugit— {{.DateFormatted}}</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                font-family:
                    system-ui,
                    -apple-system,
                    sans-serif;
                background: #f5f7fa;
                color: #1a1a1a;
            }

            /* Header */
            header {
                background: white;
                border-bottom: 1px solid #e8eaed;
                padding: 0 24px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                height: 56px;
            }
            header h1 {
                font-size: 1.2rem;
                font-weight: 700;
                letter-spacing: -0.3px;
            }
            .header-right {
                display: flex;
                align-items: center;
                gap: 16px;
                font-size: 14px;
                color: #555;
            }
            .header-right a {
                color: #555;
                text-decoration: none;
            }
            .header-right a:hover {
                color: #1a1a1a;
            }

            /* Day navigation */
            .day-nav {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 20px 24px;
                max-width: 860px;
                margin: 0 auto;
            }
            .day-nav h2 {
                font-size: 1.15rem;
                font-weight: 600;
            }
            .nav-btn {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                text-decoration: none;
                color: #444;
                padding: 8px 16px;
                border: 1px solid #dadce0;
                border-radius: 6px;
                background: white;
                font-size: 14px;
                transition: background 0.1s;
                min-width: 110px;
                justify-content: center;
            }
            .nav-btn:hover {
                background: #f0f4ff;
                border-color: #b3c2f0;
            }

            /* Main content */
            .container {
                max-width: 860px;
                margin: 0 auto;
                padding: 0 24px 64px;
            }

            .card {
                background: white;
                border-radius: 10px;
                box-shadow: 0 1px 6px rgba(0, 0, 0, 0.07);
                overflow: hidden;
            }

            /* Table */
            table {
                width: 100%;
                border-collapse: collapse;
            }
            thead th {
                padding: 11px 14px;
                text-align: left;
                font-size: 11px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.06em;
                color: #888;
                border-bottom: 1px solid #e8eaed;
                background: #fafafa;
            }
            tbody tr {
                border-bottom: 1px solid #f0f0f0;
            }
            tbody tr:last-child {
                border-bottom: none;
            }
            tbody td {
                padding: 6px 6px;
            }
            tbody td:first-child {
                padding-left: 14px;
            }
            tbody td:last-child {
                width: 44px;
                text-align: center;
            }

            input[type="text"],
            input[type="number"] {
                width: 100%;
                padding: 7px 10px;
                border: 1px solid transparent;
                border-radius: 5px;
                font-size: 14px;
                background: transparent;
                font-family: inherit;
                color: inherit;
            }
            input[type="text"]:hover,
            input[type="number"]:hover {
                border-color: #dadce0;
                background: white;
            }
            input[type="text"]:focus,
            input[type="number"]:focus {
                outline: none;
                border-color: #4285f4;
                background: white;
                box-shadow: 0 0 0 3px rgba(66, 133, 244, 0.12);
            }
            .col-hours {
                width: 100px;
            }
            .col-hours input {
                text-align: right;
            }

            .btn-delete {
                background: none;
                border: none;
                cursor: pointer;
                color: #bbb;
                font-size: 20px;
                line-height: 1;
                padding: 4px 6px;
                border-radius: 4px;
                transition: color 0.15s;
            }
            .btn-delete:hover {
                color: #e53935;
            }

            /* Table footer */
            .table-foot {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 10px 14px;
                border-top: 1px solid #e8eaed;
                background: #fafafa;
            }
            .btn-add {
                background: none;
                border: none;
                cursor: pointer;
                color: #4285f4;
                font-size: 14px;
                font-family: inherit;
                display: flex;
                align-items: center;
                gap: 5px;
                padding: 4px 0;
                font-weight: 500;
            }
            .btn-add:hover {
                color: #1a73e8;
            }
            .total-label {
                font-size: 14px;
                color: #666;
            }
            .total-label strong {
                color: #1a1a1a;
                font-size: 15px;
            }

            /* Bottom actions */
            .actions {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-top: 14px;
            }
            .btn-export {
                color: #4285f4;
                text-decoration: none;
                font-size: 14px;
                display: flex;
                align-items: center;
                gap: 5px;
                padding: 8px 0;
            }
            .btn-export:hover {
                text-decoration: underline;
            }
            .btn-save {
                padding: 8px 20px;
                border-radius: 6px;
                border: none;
                font-size: 14px;
                font-weight: 500;
                font-family: inherit;
                cursor: pointer;
                background: #4285f4;
                color: white;
                transition: background 0.15s, opacity 0.15s;
            }
            .btn-save:disabled {
                background: #dadce0;
                color: #aaa;
                cursor: default;
            }
            .btn-save:not(:disabled):hover {
                background: #1a73e8;
            }
            /* Toast notification */
            #toast {
                position: fixed;
                bottom: 24px;
                right: 24px;
                padding: 10px 16px;
                border-radius: 6px;
                font-size: 13px;
                font-weight: 500;
                z-index: 100;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.2s;
            }
            #toast.show {
                opacity: 1;
                pointer-events: auto;
            }
            #toast.ok {
                background: #e6f4ea;
                color: #1e6e2e;
                border: 1px solid #81c995;
            }
            #toast.err {
                background: #fce8e6;
                color: #c62828;
                border: 1px solid #e57373;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>Tempus fugit</h1>
            <div class="header-right">
                <span>{{.UserName}}</span>
                <a href="/logout">Sign out</a>
            </div>
        </header>

        <div class="day-nav">
            <a class="nav-btn" href="/day/{{.PrevDate}}">&#8592; Previous</a>
            <h2>{{.DateFormatted}}</h2>
            <a class="nav-btn" href="/day/{{.NextDate}}">Next &#8594;</a>
        </div>

        <div id="toast"></div>
        <div class="container">
            <form method="POST" action="/day/{{.Date}}/save" id="day-form">
                <div class="card">
                    <table>
                        <thead>
                            <tr>
                                <th>Task</th>
                                <th>Subtask</th>
                                <th
                                    class="col-hours"
                                    style="
                                        text-align: right;
                                        padding-right: 20px;
                                    "
                                >
                                    Hours
                                </th>
                                <th></th>
                            </tr>
                        </thead>
                        <datalist id="task-list">
                            {{range .TaskSuggestions}}
                            <option value="{{.}}">{{end}}</option>
                        </datalist>
                        <datalist id="subtask-list"></datalist>
                        <tbody id="entries">
                            {{range .Entries}}
                            <tr>
                                <td>
                                    <input
                                        type="text"
                                        name="task"
                                        value="{{.Task}}"
                                        placeholder="Task name"
                                        list="task-list"
                                        oninput="
                                            updateSubtaskSuggestions(
                                                this.closest('tr'),
                                            )
                                        "
                                    />
                                </td>
                                <td>
                                    <input
                                        type="text"
                                        name="subtask"
                                        value="{{.Subtask}}"
                                        placeholder="Subtask (optional)"
                                        list="subtask-list"
                                        onfocus="
                                            updateSubtaskSuggestions(
                                                this.closest('tr'),
                                            )
                                        "
                                    />
                                </td>
                                <td class="col-hours">
                                    <input
                                        type="number"
                                        name="hours"
                                        value="{{.Hours}}"
                                        min="0.25"
                                        max="24"
                                        step="0.25"
                                        placeholder="0"
                                        onkeydown="hoursTab(event)"
                                    />
                                </td>
                                <td>
                                    <button
                                        type="button"
                                        class="btn-delete"
                                        tabindex="-1"
                                        onclick="deleteRow(this)"
                                        title="Remove row"
                                    >
                                        &#215;
                                    </button>
                                </td>
                            </tr>
                            {{end}}
                        </tbody>
                    </table>
                    <div class="table-foot">
                        <button
                            type="button"
                            class="btn-add"
                            onclick="addRow()"
                        >
                            + Add row
                        </button>
                        <span class="total-label"
                            >Total:
                            <strong id="total-hours"
                                >{{printf "%.2f" .TotalHours}}h</strong
                            ></span
                        >
                    </div>
                </div>

                <div class="actions">
                    <a class="btn-export" href="/week/{{.Date}}">
                        &#128197; View week
                    </a>
                    <button type="button" id="btn-save" class="btn-save" disabled onclick="saveForm()">Save</button>
                </div>
            </form>
        </div>

        <script>
            const subtasksByTask = {{.SubtasksByTask}};

            let dirty = false;

            function rowIsComplete(row) {
              const task = row.querySelector('input[name="task"]').value.trim();
              const subtask = row.querySelector('input[name="subtask"]').value.trim();
              const hours = parseFloat(row.querySelector('input[name="hours"]').value);
              return task !== '' && subtask !== '' && hours > 0;
            }

            function updateSaveButton() {
              const btn = document.getElementById('btn-save');
              const hasComplete = Array.from(document.querySelectorAll('#entries tr')).some(rowIsComplete);
              btn.disabled = !(dirty && hasComplete);
            }

            function markDirty() {
              dirty = true;
              updateSaveButton();
            }

            function markClean() {
              dirty = false;
              updateSaveButton();
            }

            function updateSubtaskSuggestions(row) {
              const task = row.querySelector('input[name="task"]').value;
              const subtasks = subtasksByTask[task] || [];
              const datalist = document.getElementById('subtask-list');
              datalist.innerHTML = '';
              subtasks.forEach(function(s) {
                const opt = document.createElement('option');
                opt.value = s;
                datalist.appendChild(opt);
              });
            }

            function addRow() {
              const tbody = document.getElementById('entries');
              const tr = document.createElement('tr');
              tr.innerHTML = `
                <td><input type="text" name="task" placeholder="Task name" list="task-list" oninput="updateSubtaskSuggestions(this.closest('tr'))"></td>
                <td><input type="text" name="subtask" placeholder="Subtask (optional)" list="subtask-list" onfocus="updateSubtaskSuggestions(this.closest('tr'))"></td>
                <td class="col-hours"><input type="number" name="hours" min="0.25" max="24" step="0.25" placeholder="0" onkeydown="hoursTab(event)"></td>
                <td><button type="button" class="btn-delete" tabindex="-1" onclick="deleteRow(this)" title="Remove row">&#215;</button></td>
              `;
              tbody.appendChild(tr);
              tr.querySelector('input[name="task"]').focus();
              updateTotal();
            }

            function deleteRow(btn) {
              btn.closest('tr').remove();
              updateTotal();
              saveForm();
            }

            function updateTotal() {
              let total = 0;
              document.querySelectorAll('input[name="hours"]').forEach(function(el) {
                total += parseFloat(el.value) || 0;
              });
              document.getElementById('total-hours').textContent = total.toFixed(2) + 'h';
            }

            document.getElementById('entries').addEventListener('input', function(e) {
              if (e.target.name === 'hours') updateTotal();
              markDirty();
            });

            let toastTimer;
            function showToast(msg, type) {
              const t = document.getElementById('toast');
              t.textContent = msg;
              t.className = 'show ' + type;
              clearTimeout(toastTimer);
              if (type === 'ok') toastTimer = setTimeout(() => t.className = '', 2000);
            }

            async function saveForm() {
              const form = document.getElementById('day-form');
              try {
                const resp = await fetch(form.action, {
                  method: 'POST',
                  body: new URLSearchParams(new FormData(form)),
                  headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                  redirect: 'manual'
                });
                // redirect: 'manual' makes a 303 come back as opaqueredirect (status 0)
                if (resp.ok || resp.type === 'opaqueredirect') {
                  showToast('Saved', 'ok');
                  markClean();
                } else {
                  showToast('Server error — changes may not be saved', 'err');
                }
              } catch {
                showToast('Connection lost — changes not saved', 'err');
              }
            }

            function learnFromRow(row) {
              const task = row.querySelector('input[name="task"]').value.trim();
              const subtask = row.querySelector('input[name="subtask"]').value.trim();
              if (!task) return;
              // Add task to datalist if not already present.
              const taskList = document.getElementById('task-list');
              if (!Array.from(taskList.options).some(o => o.value === task)) {
                const opt = document.createElement('option');
                opt.value = task;
                taskList.insertBefore(opt, taskList.firstChild);
              }
              // Add subtask to the map if not already present.
              if (subtask) {
                if (!subtasksByTask[task]) subtasksByTask[task] = [];
                if (!subtasksByTask[task].includes(subtask)) {
                  subtasksByTask[task].unshift(subtask);
                }
              }
            }

            function hoursTab(e) {
              if (e.key !== 'Tab' || e.shiftKey) return;
              const rows = document.querySelectorAll('#entries tr');
              const isLastRow = e.target.closest('tr') === rows[rows.length - 1];
              learnFromRow(e.target.closest('tr'));
              saveForm();
              if (isLastRow) {
                e.preventDefault();
                addRow();
              }
            }

            // Start with one empty row if there are no entries.
            if (document.getElementById('entries').children.length === 0) {
              addRow();
            }
        </script>
    </body>
</html>
